services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: vpn_app

    working_dir: /var/www

    volumes:
      - ./src:/var/www

    depends_on:
      - postgres
      - redis

  nginx:

    image: nginx:latest

    container_name: vpn_nginx

    ports:
      - "127.0.0.1:8080:80"

    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  postgres:

    image: postgres:16

    container_name: vpn_postgres

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpnpass

    volumes:
      - postgres:/var/lib/postgresql/data

  redis:

    image: redis:7-alpine

    container_name: vpn_redis

volumes:
  postgres:
